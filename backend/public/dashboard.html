<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Pesa Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h1>M-Pesa Transaction Dashboard</h1>
    <h2>Statistics</h2>
    <p><strong>Total Transactions:</strong> <span id="total-transactions">0</span></p>
    <p><strong>Total Amount:</strong> <span id="total-amount">0.00 KES</span></p>

    <h2>Transaction Logs</h2>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Transaction ID</th>
                <th>Type</th>
                <th>Amount (KES)</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="transaction-logs">
            <!-- Transaction logs will be inserted here -->
        </tbody>
    </table>

    <script>
        // Sample data for demonstration
        const transactions = [
            { date: '2026-03-23 10:00:00', id: 'TX123456', type: 'Credit', amount: 500, status: 'Successful' },
            { date: '2026-03-22 14:30:00', id: 'TX123457', type: 'Debit', amount: 300, status: 'Successful' }
        ];

        // Function to populate transaction logs
        function populateTransactionLogs() {
            const logsContainer = document.getElementById('transaction-logs');
            let totalAmount = 0;
            transactions.forEach(transaction => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${transaction.date}</td>
                    <td>${transaction.id}</td>
                    <td>${transaction.type}</td>
                    <td>${transaction.amount}</td>
                    <td>${transaction.status}</td>
                `;
                logsContainer.appendChild(row);
                totalAmount += transaction.amount;
            });
            document.getElementById('total-transactions').textContent = transactions.length;
            document.getElementById('total-amount').textContent = totalAmount.toFixed(2) + ' KES';
        }

        // Call function on load
        window.onload = populateTransactionLogs;
    </script>
</body>
</html>
